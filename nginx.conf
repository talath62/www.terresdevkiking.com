server {
    listen 80;
    listen [::]:80;

    server_name terresdeviking.com www.terresdeviking.com;

    root /var/www/terresdeviking.com/frontend/dist;
    index index.html;

    access_log /var/log/nginx/terresdeviking.com.access.log;
    error_log /var/log/nginx/terresdeviking.com.error.log;

    location = /site.webmanifest {
        default_type application/manifest+json;
        try_files $uri =404;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        alias /var/www/terresdeviking.com/backend/uploads/;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name terresdeviking.com www.terresdeviking.com;

    ssl_certificate /etc/nginx/ssl/terresdeviking.com.crt;
    ssl_certificate_key /etc/nginx/ssl/terresdeviking.com.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    root /var/www/terresdeviking.com/frontend/dist;
    index index.html;

    access_log /var/log/nginx/terresdeviking.com.access.log;
    error_log /var/log/nginx/terresdeviking.com.error.log;

    location = /site.webmanifest {
        default_type application/manifest+json;
        try_files $uri =404;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        alias /var/www/terresdeviking.com/backend/uploads/;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
